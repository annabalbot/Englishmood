<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF6F0;--card:#fff;--card2:#FFF8F0;
  --a:#C4855A;--al:#F5E4D0;--ad:#7A4A28;
  --t:#2C1A0E;--ts:#8A6A52;--b:#E8D5C0;
  --ok:#4E9068;--err:#B85050;--gold:#D4A030;
  --sh:rgba(100,55,15,.10)
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:80px}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif}

/* ── HEADER ── */
.hdr{background:var(--card);border-bottom:1px solid var(--b);padding:12px 18px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 10px var(--sh)}
.logo{font-size:18px;color:var(--ad);font-weight:600;font-family:'Playfair Display',serif}.logo span{color:var(--a)}
.hdr-right{display:flex;align-items:center;gap:12px}
.streak-badge{display:flex;align-items:center;gap:5px;background:#FFF3E0;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:#C06010;border:1px solid #FFCC80}
.xp-badge{display:flex;align-items:center;gap:5px;background:var(--al);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ad);border:1px solid var(--b)}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--b);display:flex;z-index:200;box-shadow:0 -2px 10px var(--sh)}
.nb{flex:1;padding:10px 4px 8px;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:var(--ts);transition:color .2s}
.nb.on{color:var(--a)}
.nb .ni{font-size:22px;line-height:1}
.nb .nl{font-size:10px}

/* ── SECTIONS ── */
.sec{display:none}.sec.on{display:block}
.wrap{max-width:680px;margin:0 auto;padding:18px 16px}

/* ── HOME ── */
.level-card{background:linear-gradient(135deg,var(--ad),var(--a));border-radius:18px;padding:20px;color:#fff;margin-bottom:16px}
.level-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.level-name{font-size:13px;opacity:.85}
.level-num{font-size:22px;font-weight:600;font-family:'Playfair Display',serif}
.xp-bar{background:rgba(255,255,255,.25);border-radius:10px;height:8px;overflow:hidden;margin-bottom:6px}
.xp-fill{height:100%;background:#fff;border-radius:10px;transition:width .6s}
.xp-label{font-size:11px;opacity:.8;text-align:right}

.today-card{background:var(--card);border-radius:16px;border:1px solid var(--b);padding:18px;margin-bottom:16px;box-shadow:0 3px 14px var(--sh)}
.today-tag{font-size:11px;background:var(--al);color:var(--ad);border-radius:20px;padding:3px 10px;font-weight:600;display:inline-block;margin-bottom:8px}
.today-card h3{font-size:18px;margin-bottom:4px}
.today-card p{font-size:13px;color:var(--ts);margin-bottom:14px}
.today-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tp-bar{flex:1;height:7px;background:var(--al);border-radius:5px;overflow:hidden}
.tp-fill{height:100%;background:var(--a);border-radius:5px;transition:width .4s}
.tp-label{font-size:12px;color:var(--ts);white-space:nowrap}
.btn-start{width:100%;padding:13px;background:var(--a);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
.btn-start:hover{background:var(--ad)}
.btn-outline{width:100%;padding:11px;background:none;color:var(--a);border:2px solid var(--a);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-outline:hover{background:var(--al)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-mini{background:var(--card);border-radius:12px;border:1px solid var(--b);padding:14px 10px;text-align:center}
.stat-n{font-size:26px;font-weight:600;color:var(--ad);font-family:'Playfair Display',serif}
.stat-l{font-size:11px;color:var(--ts);margin-top:2px}

.badges-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.badge-chip{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:5px}
.badge-chip.earned{background:#FFF8E0;border-color:#FFD060;color:#A07010}
.badge-chip.locked{opacity:.45}

/* ── PROGRAM ── */
.week-section{margin-bottom:24px}
.week-title{font-size:14px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.add-words-btn{font-size:12px;color:var(--a);background:none;border:1px solid var(--a);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:inherit}
.day-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.day-card{background:var(--card);border-radius:14px;border:1px solid var(--b);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.day-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px var(--sh)}
.day-card.done{border-color:#B0D8B8;background:#F4FBF6}
.day-card.today-day{border-color:var(--a);border-width:2px}
.day-card.locked{opacity:.5;cursor:default}
.day-card.locked:hover{transform:none;box-shadow:none}
.day-num{font-size:11px;color:var(--ts);margin-bottom:4px}
.day-name{font-size:14px;font-weight:600;color:var(--t);margin-bottom:6px}
.day-words{font-size:11px;color:var(--ts);margin-bottom:8px}
.day-pbar{height:4px;background:var(--al);border-radius:2px;overflow:hidden}
.day-pfill{height:100%;background:var(--a);border-radius:2px}
.day-done-mark{position:absolute;top:10px;right:10px;font-size:18px}

/* ── LEARN (day detail) ── */
.learn-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ts)}
.learn-header h2{font-size:20px}

.word-card-big{background:var(--card);border-radius:20px;border:1px solid var(--b);overflow:hidden;margin-bottom:14px;box-shadow:0 4px 18px var(--sh)}
.wc-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:100px;position:relative;overflow:hidden}
.wc-img::before{content:'';position:absolute;inset:0;opacity:.15}
.wc-body{padding:18px}
.wc-en{font-size:22px;font-weight:600;color:var(--t);margin-bottom:4px;font-family:'Playfair Display',serif}
.wc-ru{font-size:14px;color:var(--ts);margin-bottom:10px}
.wc-ex{font-size:13px;color:var(--t);font-style:italic;line-height:1.6;margin-bottom:4px}
.wc-exru{font-size:12px;color:var(--a);line-height:1.5;margin-bottom:10px}
.wc-mnem{font-size:12px;color:var(--ad);background:linear-gradient(135deg,#FFF4E4,#FAF0E0);border-radius:8px;padding:8px 12px;border-left:3px solid var(--a);line-height:1.5}
.wc-foot{padding:12px 18px;border-top:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.aud-btn{background:var(--al);border:none;border-radius:8px;padding:7px 14px;font-size:13px;color:var(--ad);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit}
.aud-btn:hover{background:var(--a);color:#fff}

/* word list within a day (compact) */
.day-words-list{display:grid;gap:10px;margin-bottom:16px}
.dwl-item{background:var(--card);border-radius:12px;border:1px solid var(--b);display:flex;align-items:center;gap:12px;padding:10px 12px;cursor:pointer;transition:all .2s}
.dwl-item:hover{border-color:var(--a);background:var(--al)}
.dwl-em{font-size:36px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
.dwl-info{flex:1;min-width:0}
.dwl-en{font-size:14px;font-weight:600;color:var(--t)}
.dwl-ru{font-size:12px;color:var(--ts)}
.dwl-ex{font-size:11.5px;color:var(--ts);font-style:italic;line-height:1.4;margin-top:2px}

/* ── QUIZ ── */
.qz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.qz-progress{display:flex;align-items:center;gap:8px;flex:1}
.qz-pbar{flex:1;height:6px;background:var(--al);border-radius:3px;overflow:hidden}
.qz-pfill{height:100%;background:var(--a);border-radius:3px;transition:width .3s}
.qz-counter{font-size:12px;color:var(--ts);white-space:nowrap}
.qz-score-badge{background:var(--al);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--ad)}

.qz-card{background:var(--card);border-radius:20px;border:1px solid var(--b);padding:26px;box-shadow:0 4px 18px var(--sh);min-height:340px;display:flex;flex-direction:column}
.qz-em{font-size:72px;text-align:center;margin-bottom:14px}
.qz-label{font-size:11px;color:var(--ts);text-align:center;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.qz-q{font-size:20px;text-align:center;color:var(--t);margin-bottom:20px;line-height:1.4;font-family:'Playfair Display',serif}
.qz-q em{font-style:normal;background:var(--al);border-radius:4px;padding:0 6px}

.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mc-btn{padding:13px 12px;border:2px solid var(--b);border-radius:11px;background:var(--card);font-size:13px;cursor:pointer;text-align:left;transition:all .2s;color:var(--t);font-family:inherit;line-height:1.3}
.mc-btn:hover:not(:disabled){border-color:var(--a);background:var(--al)}
.mc-btn.ok{border-color:var(--ok)!important;background:#EAF5EE!important;color:var(--ok)!important}
.mc-btn.bad{border-color:var(--err)!important;background:#FFE8E8!important;color:var(--err)!important}

.qz-inp{width:100%;padding:13px 14px;border:2px solid var(--b);border-radius:11px;font-size:15px;background:var(--card);color:var(--t);outline:none;transition:border-color .2s;margin-bottom:10px;font-family:inherit}
.qz-inp:focus{border-color:var(--a)}
.qz-inp.ok{border-color:var(--ok);background:#EAF5EE}
.qz-inp.bad{border-color:var(--err);background:#FFE8E8}

.qz-fb{text-align:center;padding:10px;border-radius:9px;font-size:14px;font-weight:500;margin-bottom:10px;display:none}
.qz-fb.on{display:block}
.qz-fb.ok{background:#EAF5EE;color:var(--ok)}
.qz-fb.bad{background:#FFE8E8;color:var(--err)}

.btn-check{width:100%;padding:13px;border:none;border-radius:11px;background:var(--a);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:auto;font-family:inherit}
.btn-check:hover{background:var(--ad)}
.btn-next{width:100%;padding:13px;border:none;border-radius:11px;background:var(--al);color:var(--ad);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:none;font-family:inherit}
.btn-next.on{display:block}
.btn-next:hover{background:var(--a);color:#fff}

/* XP popup */
.xp-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--a);color:#fff;padding:10px 22px;border-radius:30px;font-size:16px;font-weight:700;pointer-events:none;opacity:0;z-index:999;font-family:'Playfair Display',serif}
.xp-pop.show{animation:xpFloat 1.2s ease forwards}
@keyframes xpFloat{0%{opacity:1;transform:translate(-50%,-50%) scale(.8)}30%{opacity:1;transform:translate(-50%,-70%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-110%) scale(1)}}

/* ── PROGRESS ── */
.big-score{background:linear-gradient(135deg,var(--ad),var(--a));color:#fff;border-radius:20px;padding:28px;text-align:center;margin-bottom:18px}
.big-score-n{font-size:64px;font-weight:600;font-family:'Playfair Display',serif}
.big-score-l{font-size:14px;opacity:.85;margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sg-card{background:var(--card);border-radius:12px;border:1px solid var(--b);padding:14px 10px;text-align:center}
.sg-n{font-size:30px;font-weight:600;color:var(--ad);font-family:'Playfair Display',serif}
.sg-l{font-size:11px;color:var(--ts)}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.badge-card{background:var(--card);border-radius:12px;border:1px solid var(--b);padding:14px;text-align:center}
.badge-card.earned{background:#FFFBEC;border-color:#FFD060}
.badge-card.locked{opacity:.4}
.badge-icon{font-size:30px;margin-bottom:6px}
.badge-name{font-size:12px;font-weight:600;color:var(--t)}
.badge-desc{font-size:10px;color:var(--ts);margin-top:2px}

/* ── ADD WORDS MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hide{display:none}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:680px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-input{width:100%;padding:11px 13px;border:1.5px solid var(--b);border-radius:10px;font-size:14px;background:var(--card);color:var(--t);outline:none;margin-bottom:8px;font-family:inherit}
.modal-input:focus{border-color:var(--a)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ts)}

/* ── MISC ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--t);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.reset-btn{padding:9px 18px;border:1.5px solid var(--b);border-radius:9px;background:var(--card);color:var(--ts);font-size:13px;cursor:pointer;font-family:inherit}
.reset-btn:hover{border-color:var(--err);color:var(--err)}

@media(max-width:500px){
  .mc-grid{grid-template-columns:1fr}
  .day-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .stats-row{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">English <span>Daily</span></div>
  <div class="hdr-right">
    <div class="streak-badge">🔥 <span id="streak-n">0</span> дней</div>
    <div class="xp-badge">⭐ <span id="xp-n">0</span> XP</div>
  </div>
</div>

<!-- SECTIONS -->
<div class="sec on" id="sec-home">
  <div class="wrap">
    <div class="level-card">
      <div class="level-top">
        <div><div class="level-name" id="lv-name">Уровень 1</div><div class="level-num" id="lv-title">Новичок</div></div>
        <div style="font-size:36px" id="lv-icon">🌱</div>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xp-bar-fill" style="width:0%"></div></div>
      <div class="xp-label" id="xp-label">0 / 100 XP</div>
    </div>
    <div class="today-card" id="today-card"></div>
    <div class="stats-row" id="home-stats"></div>
    <h3 style="font-size:16px;margin-bottom:10px">Достижения</h3>
    <div class="badges-row" id="home-badges"></div>
  </div>
</div>

<div class="sec" id="sec-program">
  <div class="wrap">
    <h2 style="font-size:22px;margin-bottom:18px">Программа обучения</h2>
    <div id="program-content"></div>
  </div>
</div>

<div class="sec" id="sec-learn">
  <div class="wrap">
    <div class="learn-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <h2 id="learn-title">День 1</h2>
    </div>
    <div id="learn-content"></div>
  </div>
</div>

<div class="sec" id="sec-quiz">
  <div class="wrap">
    <div class="qz-top">
      <div class="qz-progress">
        <div class="qz-pbar"><div class="qz-pfill" id="qz-pfill" style="width:0%"></div></div>
        <span class="qz-counter" id="qz-ctr">0 / 0</span>
      </div>
      <div class="qz-score-badge" id="qz-score">0%</div>
    </div>
    <div class="qz-card" id="qz-card"><div id="qz-content"></div></div>
  </div>
</div>

<div class="sec" id="sec-progress">
  <div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <h2 style="font-size:22px">Мой прогресс</h2>
      <button class="reset-btn" onclick="resetAll()">Сбросить</button>
    </div>
    <div class="big-score">
      <div class="big-score-n" id="big-pct">0%</div>
      <div class="big-score-l">точность в тестах</div>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
    <h3 style="font-size:16px;margin-bottom:12px">Достижения</h3>
    <div class="badges-grid" id="badges-grid"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb on" onclick="go('home')"><span class="ni">🏠</span><span class="nl">Главная</span></button>
  <button class="nb" onclick="go('program')"><span class="ni">📅</span><span class="nl">Программа</span></button>
  <button class="nb" onclick="go('quiz')"><span class="ni">✏️</span><span class="nl">Тест</span></button>
  <button class="nb" onclick="go('progress')"><span class="ni">📊</span><span class="nl">Прогресс</span></button>
</nav>

<!-- Modal: add words -->
<div class="modal-bg hide" id="add-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Добавить слово</h3>
    <p style="font-size:13px;color:var(--ts);margin-bottom:14px">Добавь своё слово или фразу в программу</p>
    <input class="modal-input" id="m-en" placeholder="Английский (например: absolutely)">
    <input class="modal-input" id="m-ru" placeholder="Русский (например: абсолютно)">
    <input class="modal-input" id="m-ex" placeholder="Пример на английском">
    <input class="modal-input" id="m-exru" placeholder="Перевод примера">
    <input class="modal-input" id="m-em" placeholder="Эмодзи 🎯" style="width:80px">
    <div id="m-day-label" style="font-size:13px;color:var(--ts);margin:8px 0 4px">Добавить в день:</div>
    <select class="modal-input" id="m-day" style="width:auto"></select>
    <button class="btn-start" style="margin-top:12px" onclick="saveCustomWord()">Добавить ✓</button>
  </div>
</div>

<div class="xp-pop" id="xp-pop">+10 XP ✨</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════ VOCABULARY ══════════════ */
const V=[
  {id:1,en:"Nowadays",ru:"В наши дни",ex:"Nowadays everyone uses smartphones.",exru:"В наши дни все пользуются смартфонами.",em:"📱",cat:"time",blank:"___ everyone uses smartphones.",ans:"nowadays"},
  {id:2,en:"Not a big deal",ru:"Не страшно / Пустяки",ex:"Don't worry, it's not a big deal!",exru:"Не переживай, это пустяки!",em:"🤷",cat:"phrases",blank:"Don't worry, it's not a big ___!",ans:"deal"},
  {id:3,en:"I'm going to…",ru:"Я собираюсь…",ex:"I'm going to cook dinner tonight.",exru:"Я собираюсь приготовить ужин сегодня.",em:"📅",cat:"grammar",blank:"I'm going to ___ dinner tonight.",ans:"cook"},
  {id:4,en:"Weird",ru:"Странный",ex:"That was a really weird dream.",exru:"Это был очень странный сон.",em:"😵",cat:"adjectives",blank:"That was a really ___ dream.",ans:"weird"},
  {id:5,en:"To make the bed",ru:"Застилать постель",ex:"I always make the bed before leaving.",exru:"Я всегда застилаю постель перед выходом.",em:"🛏️",cat:"daily",blank:"I always make the ___ before leaving.",ans:"bed"},

let G={xp:0,streak:0,lastStudyDate:'',daysCompleted:0,totalCorrect:0,totalAnswered:0,currentStreak:0,earnedBadges:[],dayProgress:{}};
let QZ={items:[],idx:0,correct:0,total:0,answered:false,dayId:null};

function loadG(){try{const s=localStorage.getItem('english_g');if(s)G=Object.assign(G,JSON.parse(s));}catch(e){}}
function saveG(){localStorage.setItem('english_g',JSON.stringify(G));}

function getLv(){
  for(let i=LEVELS.length-1;i>=0;i--) if(G.xp>=LEVELS[i].xp) return LEVELS[i];
  return LEVELS[0];
}
function getNextLv(){
  const cur=getLv();
  return LEVELS.find(l=>l.xp>cur.xp)||cur;
}

function addXP(amount){
  G.xp+=amount;
  showXPPop('+'+amount+' XP ✨');
  checkBadges();
  saveG();
  updateHeader();
}
function showXPPop(msg){
  const el=document.getElementById('xp-pop');
  el.textContent=msg; el.className='xp-pop show';
  setTimeout(()=>el.className='xp-pop',1400);
}

function checkStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(G.lastStudyDate===today) return;
  if(G.lastStudyDate===yesterday) G.streak++;
  else if(G.lastStudyDate!==today) G.streak=1;
  G.lastStudyDate=today;
  saveG();
  updateHeader();
}
function checkBadges(){
  let newBadge=false;
  BADGES.forEach(b=>{
    if(!G.earnedBadges.includes(b.id)&&b.check(G)){
      G.earnedBadges.push(b.id);
      newBadge=true;
      toast('🏅 Достижение: '+b.name+'!');
    }
  });
  if(newBadge) saveG();
}

function go(sec){
  if(sec!=='learn') PREV_SEC=sec;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+sec).classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>{
    const map={home:'🏠',program:'📅',quiz:'✏️',progress:'📊'};
    if(b.querySelector('.ni').textContent===map[sec]) b.classList.add('on');
  });
  if(sec==='home') renderHome();
  if(sec==='program') renderProgram();
  if(sec==='quiz') startQuiz();
  if(sec==='progress') renderProgress();
}
function goBack(){ go(PREV_SEC); }

/* ══ HOME ══ */
function renderHome(){
  updateHeader();
  const lv=getLv(), nextLv=getNextLv();
  const xpInLv=G.xp-lv.xp, xpNeeded=nextLv.xp-lv.xp;
  const pct=xpNeeded>0?Math.round(xpInLv/xpNeeded*100):100;
  document.getElementById('lv-name').textContent='Уровень '+lv.lv;
  document.getElementById('lv-title').textContent=lv.name;
  document.getElementById('lv-icon').textContent=lv.icon;
  document.getElementById('xp-bar-fill').style.width=pct+'%';
  document.getElementById('xp-label').textContent=G.xp+' / '+nextLv.xp+' XP';

  // Today card
  const allDays=DAY_PLAN;
  const todayDay=allDays.find(d=>!(G.dayProgress[d.day]?.done))||allDays[allDays.length-1];
  const dp=G.dayProgress[todayDay.day]||{seen:0};
  const pct2=Math.round((dp.seen||0)/10*100);
  document.getElementById('today-card').innerHTML=`
    <div class="today-tag">📖 Сегодня</div>
    <h3>День ${todayDay.day}: ${todayDay.title}</h3>
    <p>10 новых слов и выражений</p>
    <div class="today-progress">
      <div class="tp-bar"><div class="tp-fill" style="width:${pct2}%"></div></div>
      <span class="tp-label">${dp.seen||0} / 10</span>
    </div>
    <button class="btn-start" onclick="openDay(${todayDay.day})">Начать урок →</button>
  `;

  // Stats
  const words=allWords().length;
  const learned=Object.values(G.dayProgress).filter(d=>d.done).length*10;
  const acc=G.totalAnswered>0?Math.round(G.totalCorrect/G.totalAnswered*100):0;
  document.getElementById('home-stats').innerHTML=`
    <div class="stat-mini"><div class="stat-n">${G.streak}</div><div class="stat-l">🔥 Дней подряд</div></div>
    <div class="stat-mini"><div class="stat-n">${learned}</div><div class="stat-l">📚 Изучено слов</div></div>
    <div class="stat-mini"><div class="stat-n">${acc}%</div><div class="stat-l">🎯 Точность</div></div>
  `;

  // Badges
  const el=document.getElementById('home-badges');
  el.innerHTML='';
  BADGES.slice(0,6).forEach(b=>{
    const e=G.earnedBadges.includes(b.id);
    el.innerHTML+=`<div class="badge-chip ${e?'earned':'locked'}">${b.icon} ${b.name}</div>`;

function updateHeader(){
  document.getElementById('streak-n').textContent=G.streak;
  document.getElementById('xp-n').textContent=G.xp;
}

/* ══ PROGRAM ══ */
function renderProgram(){
  const el=document.getElementById('program-content');
  el.innerHTML='';
  const weeks=[
    {w:1,days:[1,2,3,4]},{w:2,days:[5,6,7,8]},{w:3,days:[9,10,11,12]},{w:4,days:[13,14,15]}
  ];
  const todayDayNum=(DAY_PLAN.find(d=>!G.dayProgress[d.day]?.done)||DAY_PLAN[DAY_PLAN.length-1]).day;

  weeks.forEach(wk=>{
    const total=wk.days.length*10;
    const done=wk.days.filter(d=>G.dayProgress[d]?.done).length;
    let html=`<div class="week-section">
      <div class="week-title">
        <span>Неделя ${wk.w} · ${done*10}/${total} слов</span>
        <button class="add-words-btn" onclick="openAddModal(${wk.days[wk.days.length-1]})">+ Добавить слова</button>
      </div>
      <div class="day-grid">`;
    wk.days.forEach(dayNum=>{
      const plan=DAY_PLAN.find(d=>d.day===dayNum);
      if(!plan) return;
      const dp=G.dayProgress[dayNum]||{};
      const isDone=dp.done;
      const isToday=dayNum===todayDayNum;
      const isLocked=dayNum>todayDayNum+1&&!isDone;
      const seen=dp.seen||0;
      const cls=isDone?'done':isToday?'today-day':isLocked?'locked':'';
      html+=`<div class="day-card ${cls}" onclick="${isLocked?'':'openDay('+dayNum+')'}">
        <div class="day-num">День ${dayNum}</div>
        <div class="day-name">${plan.title}</div>
        <div class="day-words">${plan.ids.length} слов</div>
        <div class="day-pbar"><div class="day-pfill" style="width:${Math.round(seen/10*100)}%"></div></div>
        ${isDone?'<div class="day-done-mark">✅</div>':isToday?'<div class="day-done-mark">📌</div>':isLocked?'<div class="day-done-mark">🔒</div>':''}
      </div>`;
    });
    html+='</div></div>';
    el.innerHTML+=html;
  });
}

/* ══ OPEN DAY ══ */
function openDay(dayNum){
  CURRENT_DAY=dayNum;
  const activeNb=document.querySelector('.nb.on .nl');
  if(activeNb) PREV_SEC=activeNb.textContent==='Программа'?'program':'home';
  const plan=DAY_PLAN.find(d=>d.day===dayNum);
  if(!plan) return;
  document.getElementById('learn-title').textContent='День '+dayNum+': '+plan.title;

  const words=plan.ids.map(id=>allWords().find(w=>w.id===id)).filter(Boolean);
  const dp=G.dayProgress[dayNum]||{seen:0};

  let html='';
  // word list
  words.forEach((w,i)=>{
    const bg=CC[w.cat]?CC[w.cat][0]:'#F5F0EA';
    html+=`<div class="dwl-item" onclick="showWordDetail(${w.id})">
      <div class="dwl-em" style="background:${bg}">${w.em}</div>
      <div class="dwl-info">
        <div class="dwl-en">${w.en}</div>
        <div class="dwl-ru">${w.ru}</div>
        <div class="dwl-ex">${w.ex}</div>
      </div>
      <button class="aud-btn" style="flex-shrink:0" onclick="event.stopPropagation();speak('${w.en.replace(/'/g,"\\'")}')" title="Слушать">🔊</button>
    </div>`;
  });
  html+=`<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="btn-outline" onclick="markDaySeen(${dayNum})">✓ Изучил слова</button>
    <button class="btn-start" onclick="startDayQuiz(${dayNum})">Тест по уроку →</button>
  </div>`;

  document.getElementById('learn-content').innerHTML=html;
  go('learn');
}

function markDaySeen(dayNum){
  if(!G.dayProgress[dayNum]) G.dayProgress[dayNum]={};
  G.dayProgress[dayNum].seen=10;
  G.dayProgress[dayNum].done=true;
  G.daysCompleted=Object.values(G.dayProgress).filter(d=>d.done).length;
  addXP(30);
  checkStreak();
  checkBadges();
  saveG();
  toast('✅ Слова отмечены как изученные! +30 XP');
  openDay(dayNum);
}

function showWordDetail(id){
  const w=allWords().find(x=>x.id===id);
  if(!w) return;
  const bg1=CC[w.cat]?CC[w.cat][0]:'#F5F0EA';

  const mnem=MN[w.id]||'';

    <button class="back-btn" onclick="openDay(${CURRENT_DAY})" style="margin-bottom:14px;display:block">← Назад к уроку</button>
    <div class="word-card-big">
      <div class="wc-img" style="background:linear-gradient(135deg,${bg1},${bg2}22)">${w.em}</div>
      <div class="wc-body">
        <div class="wc-en">${w.en}</div>
        <div class="wc-ru">${w.ru}</div>
        <div class="wc-ex">${w.ex}</div>
        <div class="wc-exru">${w.exru}</div>
        ${mnem?`<div class="wc-mnem">🧠 ${mnem}</div>`:''}
      </div>
      <div class="wc-foot">
        <button class="aud-btn" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊 Прослушать</button>
        <button class="aud-btn" onclick="speak('${w.ex.replace(/'/g,"\\'")}')">🔊 Пример</button>
      </div>
    </div>`;

}

/* ══ QUIZ ══ */
function startQuiz(dayId){
  checkStreak();
  const card=document.getElementById('qz-card');
  if(card && !document.getElementById('qz-content')) card.innerHTML='<div id="qz-content"></div>';
  const pf=document.getElementById('qz-pfill'); if(pf) pf.style.width='0%';
  const pool=dayId
    ?DAY_PLAN.find(d=>d.day===dayId)?.ids.map(id=>allWords().find(w=>w.id===id)).filter(Boolean)
    :allWords().sort(()=>Math.random()-.5).slice(0,15);

  QZ.items=pool||[];
  QZ.idx=0; QZ.correct=0; QZ.total=QZ.items.length; QZ.answered=false; QZ.dayId=dayId||null;
  if(!QZ.items.length){document.getElementById('qz-content').innerHTML='<p style="text-align:center;padding:40px;color:var(--ts)">Нет слов для теста</p>';return;}
  nextQ();
}
function startDayQuiz(dayId){CURRENT_DAY=dayId;go('quiz');startQuiz(dayId);}

function nextQ(){
  QZ.answered=false;
  if(QZ.idx>=QZ.items.length){showQuizDone();return;}
  const v=QZ.items[QZ.idx];
  const t=QZ.idx%3;
  document.getElementById('qz-pfill').style.width=(QZ.idx/QZ.total*100)+'%';
  document.getElementById('qz-ctr').textContent=(QZ.idx+1)+' / '+QZ.total;
  document.getElementById('qz-score').textContent=QZ.total?Math.round(QZ.correct/Math.max(QZ.idx,1)*100)+'%':'0%';
  if(t===0) renderMC(v);
  else if(t===1) renderFill(v);
  else renderType(v);
}

function renderMC(v){
  const aw=allWords();
  const wrong=aw.filter(x=>x.id!==v.id).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[v,...wrong].sort(()=>Math.random()-.5);
  document.getElementById('qz-content').innerHTML=`
    <div class="qz-em">${v.em}</div>
    <div class="qz-label">Как сказать по-английски?</div>
    <div class="qz-q">${v.ru}</div>
    <div class="mc-grid">
      ${opts.map(o=>`<button class="mc-btn" onclick="checkMC(this,${o.id==v.id},${v.id})" data-ok="${o.id===v.id}">${o.en}</button>`).join('')}
    </div>
    <div class="qz-fb" id="qz-fb"></div>
    <button class="btn-next on" id="btn-next" onclick="nextQ()" style="display:none">Дальше →</button>`;
}
function checkMC(el,ok,vid){
  if(QZ.answered) return;
  QZ.answered=true;
  G.totalAnswered++;
  if(ok){QZ.correct++;G.totalCorrect++;G.currentStreak++;el.classList.add('ok');addXP(15);}
  else{G.currentStreak=0;el.classList.add('bad');document.querySelector('.mc-btn[data-ok="true"]').classList.add('ok');}
  document.querySelectorAll('.mc-btn').forEach(b=>b.disabled=true);
  showFB(ok, allWords().find(x=>x.id==vid)?.en||'');
  QZ.idx++;
  saveG();
}

function renderFill(v){
  document.getElementById('qz-content').innerHTML=`
    <div class="qz-em">${v.em}</div>
    <div class="qz-label">Вставь пропущенное слово</div>
    <div class="qz-q">${v.blank.replace('___','<em>___</em>')}</div>
    <input class="qz-inp" id="qz-inp" placeholder="Введи слово..." autocomplete="off" onkeydown="if(event.key==='Enter')checkFill(${v.id})">
    <div class="qz-fb" id="qz-fb"></div>
    <button class="btn-check" onclick="checkFill(${v.id})">Проверить</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Дальше →</button>`;
  setTimeout(()=>document.getElementById('qz-inp')?.focus(),80);
}
function checkFill(vid){
  if(QZ.answered) return;
  const v=allWords().find(x=>x.id==vid);
  const inp=document.getElementById('qz-inp');
  const ans=inp.value.trim().toLowerCase();
  const ok=ans===v.ans.toLowerCase()||ans===v.en.toLowerCase()||(v.en.toLowerCase().includes(ans)&&ans.length>2);
  QZ.answered=true; G.totalAnswered++;
  if(ok){QZ.correct++;G.totalCorrect++;G.currentStreak++;inp.classList.add('ok');addXP(15);}
  else{G.currentStreak=0;inp.classList.add('bad');}
  QZ.idx++;
  showFB(ok,v.ans); saveG();
}

function renderType(v){
  document.getElementById('qz-content').innerHTML=`
    <div class="qz-em">${v.em}</div>
    <div class="qz-label">Переведи на английский</div>
    <div class="qz-q">${v.ru}</div>
    <input class="qz-inp" id="qz-inp" placeholder="Напиши по-английски..." autocomplete="off" onkeydown="if(event.key==='Enter')checkType(${v.id})">
    <div class="qz-fb" id="qz-fb"></div>
    <button class="btn-check" onclick="checkType(${v.id})">Проверить</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Дальше →</button>`;
  setTimeout(()=>document.getElementById('qz-inp')?.focus(),80);
}
function checkType(vid){
  if(QZ.answered) return;
  const v=allWords().find(x=>x.id==vid);
  const inp=document.getElementById('qz-inp');
  const ans=inp.value.trim().toLowerCase();
  const en=v.en.toLowerCase();
  const ok=ans===en||en.includes(ans)&&ans.length>=3||lev(ans,en)<=2;
  QZ.answered=true; G.totalAnswered++;
  if(ok){QZ.correct++;G.totalCorrect++;G.currentStreak++;inp.classList.add('ok');addXP(15);}
  else{G.currentStreak=0;inp.classList.add('bad');}
  QZ.idx++;
  showFB(ok,v.en); saveG();
}

function showFB(ok,answer){
  const fb=document.getElementById('qz-fb');
  fb.className='qz-fb on '+(ok?'ok':'bad');
  const safeAns=answer.replace(/'/g,"\\'");
  fb.innerHTML=ok?`✅ Правильно! <button onclick="speak('${safeAns}')" style="background:none;border:none;cursor:pointer">🔊</button>`:`❌ Ответ: <strong>${answer}</strong> <button onclick="speak('${safeAns}')" style="background:none;border:none;cursor:pointer">🔊</button>`;
  const bn=document.getElementById('btn-next');
  if(bn){bn.style.display='block';}
  const bc=document.querySelector('.btn-check');
  if(bc) bc.style.display='none';
  document.getElementById('qz-score').textContent=Math.round(QZ.correct/Math.max(QZ.idx,1)*100)+'%';
}

function showQuizDone(){
  const pct=Math.round(QZ.correct/QZ.total*100);
  const icon=pct>=80?'🎉':pct>=60?'👍':'💪';
  const msg=pct>=80?'Отлично!':pct>=60?'Хорошая работа!':'Продолжай практиковаться!';
  if(QZ.dayId){
    if(!G.dayProgress[QZ.dayId]) G.dayProgress[QZ.dayId]={};
    G.dayProgress[QZ.dayId].done=true;
    G.dayProgress[QZ.dayId].seen=10;
    G.daysCompleted=Object.values(G.dayProgress).filter(d=>d.done).length;
    addXP(50);
  }
  checkBadges(); saveG();
  document.getElementById('qz-card').innerHTML=`
    <div style="text-align:center;padding:30px 10px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
      <div style="font-size:64px">${icon}</div>
      <h2 style="font-size:26px;color:var(--ad)">${msg}</h2>
      <div style="font-size:48px;font-weight:700;color:var(--a);font-family:'Playfair Display',serif">${pct}%</div>
      <p style="color:var(--ts);font-size:14px">${QZ.correct} из ${QZ.total} правильно</p>
      <button class="btn-start" onclick="startQuiz()" style="width:auto;padding:12px 28px">Другой тест 🔄</button>
      <button class="btn-outline" onclick="go('program')" style="width:auto;padding:10px 24px">К урокам 📅</button>
      <button class="btn-outline" onclick="go('home')" style="width:auto;padding:10px 24px">На главную 🏠</button>
    </div>`;
  document.getElementById('qz-pfill').style.width='100%';
}

function lev(a,b){
  const m=a.length,n=b.length;
  if(m>10||n>10) return Math.abs(m-n);
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i?j?0:i:j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

/* ══ PROGRESS ══ */
function renderProgress(){
  const acc=G.totalAnswered>0?Math.round(G.totalCorrect/G.totalAnswered*100):0;
  document.getElementById('big-pct').textContent=acc+'%';

/* ══ ADD WORDS ══ */
let addToDay=1;
function openAddModal(dayNum){
  addToDay=dayNum;
  const sel=document.getElementById('m-day');
  sel.innerHTML=DAY_PLAN.map(d=>`<option value="${d.day}"${d.day===dayNum?' selected':''}>День ${d.day}: ${d.title}</option>`).join('');
  document.getElementById('add-modal').classList.remove('hide');
}
function closeModal(){document.getElementById('add-modal').classList.add('hide');}
function saveCustomWord(){
  const en=document.getElementById('m-en').value.trim();
  const ru=document.getElementById('m-ru').value.trim();
  if(!en||!ru){toast('Введи английское и русское слово');return;}
  const ex=document.getElementById('m-ex').value.trim()||en+' is a useful word.';
  const exru=document.getElementById('m-exru').value.trim()||ru+' — полезное слово.';
  const em=document.getElementById('m-em').value.trim()||'📝';
  const dayNum=parseInt(document.getElementById('m-day').value)||1;
  const words=loadCustomWords();
  const newId=10000+Date.now()%1000000;
  const w={id:newId,en,ru,ex,exru,em,cat:'common',blank:en+' is a ___ word.',ans:en.split(' ')[0].toLowerCase(),custom:true};
  words.push(w);
  localStorage.setItem('custom_words',JSON.stringify(words));
  const plan=DAY_PLAN.find(d=>d.day===dayNum);
  if(plan&&!plan.ids.includes(newId)) plan.ids.push(newId);
  closeModal();
  ['m-en','m-ru','m-ex','m-exru','m-em'].forEach(id=>document.getElementById(id).value='');
  toast('✅ Слово добавлено: '+en);
}

/* ══ SPEECH ══ */
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.82; u.pitch=1;
  window.speechSynthesis.speak(u);
}

/* ══ TOAST ══ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

function resetAll(){
  if(confirm('Сбросить весь прогресс? Это нельзя отменить.')){
    G={xp:0,streak:0,lastStudyDate:'',daysCompleted:0,totalCorrect:0,totalAnswered:0,currentStreak:0,earnedBadges:[],dayProgress:{}};
    saveG(); renderProgress(); renderHome(); updateHeader();
    toast('Прогресс сброшен');
  }
}

/* ══ INIT ══ */
loadG(); checkStreak(); renderHome();
